name: CRE Simulation CI

on:
  push:
    paths:
      - "cre-workflow/**"
      - ".github/workflows/cre-sim.yml"
  pull_request:
    paths:
      - "cre-workflow/**"
      - ".github/workflows/cre-sim.yml"
  workflow_dispatch:

jobs:
  cre-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cre-workflow
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cre-workflow/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build workflow code
        run: npm run build

      - name: Validate workflow files
        run: |
          test -f workflow.yaml
          test -f project.yaml
          test -f secrets.yaml
          test -f src/index.ts

  cre-simulate:
    runs-on: ubuntu-latest
    needs: cre-validate
    defaults:
      run:
        working-directory: cre-workflow
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cre-workflow/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run unit tests (peg-monitor + action-dispatcher simulation)
        run: npm test
